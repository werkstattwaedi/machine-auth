#
# Builds the kiosk binary. URL + bearer are baked in by
# scripts/inject-build-config.mjs before this config is read.

appId: ch.werkstattwaedi.checkout-kiosk
productName: OWW Self Checkout
directories:
  output: release/kiosk
files:
  - dist/**/*
  - renderer/**/*
  - assets/**/*
  - package.json
  - node_modules/**/*
extraMetadata:
  name: oww-kiosk
win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch: x64
  artifactName: oww-kiosk-${version}-setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - AppImage
  artifactName: oww-kiosk-${version}-${arch}.${ext}
mac:
  target: dmg
  artifactName: oww-kiosk-${version}-${arch}.${ext}
