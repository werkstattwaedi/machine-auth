#
# Builds the kiosk-mode binary. Mode + URL + bearer + printer-host are
# baked in by scripts/inject-build-config.mjs before this config is read
# (npm run build:kiosk sets BRIDGE_MODE=kiosk).

appId: ch.werkstattwaedi.checkout-kiosk
productName: OWW Kiosk
directories:
  output: release/kiosk
files:
  - dist/**/*
  - renderer/**/*
  - package.json
  - node_modules/**/*
extraMetadata:
  name: oww-kiosk
win:
  # `zip` is the no-Wine path: cross-compiles from Linux/WSL with no
  # extra tooling, produces a self-contained folder zip. Unzip on the
  # target Windows host and run `OWW Kiosk.exe` directly. See the
  # admin yml for the rationale.
  target:
    - target: zip
      arch: x64
  artifactName: oww-kiosk-${version}-${arch}.${ext}
linux:
  target:
    - AppImage
  artifactName: oww-kiosk-${version}-${arch}.${ext}
mac:
  target: dmg
  artifactName: oww-kiosk-${version}-${arch}.${ext}
