#
# Builds the kiosk binary. URL + bearer are baked in by
# scripts/inject-build-config.mjs before this config is read.

appId: ch.werkstattwaedi.checkout-kiosk
productName: OWW Self Checkout
directories:
  output: release/kiosk
files:
  - dist/**/*
  - renderer/**/*
  - assets/**/*
  - package.json
  - node_modules/**/*
extraMetadata:
  name: oww-kiosk
win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch: x64
  # KIOSK_DIST is set by the build:kiosk* npm scripts (dev/staging/prod)
  # so installers from different environments can't overwrite each other.
  artifactName: oww-kiosk-${env.KIOSK_DIST}-${version}-setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - AppImage
  artifactName: oww-kiosk-${env.KIOSK_DIST}-${version}-${arch}.${ext}
mac:
  target: dmg
  artifactName: oww-kiosk-${env.KIOSK_DIST}-${version}-${arch}.${ext}
