#
# Builds the admin-mode binary. Mode + URL + bearer + printer-host are
# baked in by scripts/inject-build-config.mjs before this config is read
# (npm run build:admin sets BRIDGE_MODE=admin).

appId: ch.werkstattwaedi.admin
productName: OWW Admin
directories:
  output: release/admin
files:
  - dist/**/*
  - renderer/**/*
  - package.json
  - node_modules/**/*
extraMetadata:
  name: oww-admin
win:
  # `zip` is the no-Wine path: cross-compiles from Linux/WSL with no
  # extra tooling, produces a self-contained folder zip. Unzip on the
  # target Windows host and run `OWW Admin.exe` directly. `nsis` is
  # also listed for when a Windows / Wine-equipped host wants the
  # installer, but the build doesn't fail without it.
  target:
    - target: zip
      arch: x64
  artifactName: oww-admin-${version}-${arch}.${ext}
linux:
  target:
    - AppImage
  artifactName: oww-admin-${version}-${arch}.${ext}
mac:
  target: dmg
  artifactName: oww-admin-${version}-${arch}.${ext}
