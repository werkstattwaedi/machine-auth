<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout Kiosk</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="top-bar">
    <button id="btn-reset">Neuer Checkout</button>
  </div>
  <!-- partition: dedicated, wipeable storage for the kiosk webview.
       The main process clears this on app start, on Neuer Checkout, and
       on inactivity timeouts from the web app — so a closed kiosk
       window equals a closed session. -->
  <webview id="checkout-view" partition="persist:kiosk:volatile"></webview>
  <script src="renderer.js"></script>
</body>
</html>
