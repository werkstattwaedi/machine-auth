syntax = "proto3";

package maco.secrets;

// RPC service for factory provisioning of device secrets.
// This service is used during device setup to provision cryptographic
// keys. Once provisioned, secrets persist across reboots.
service DeviceSecretsService {
  // Check if secrets have been provisioned.
  rpc GetStatus(Empty) returns (StatusResponse);

  // Provision device secrets. By default fails if already provisioned;
  // set ProvisionRequest.force = true to clear-then-write atomically
  // (used by the factory tool to re-key a device).
  rpc Provision(ProvisionRequest) returns (ProvisionResponse);

  // Clear all provisioned secrets.
  // WARNING: This erases cryptographic material permanently.
  rpc Clear(Empty) returns (ProvisionResponse);

  // Verify whether the stored secrets match a candidate set, without
  // exposing the stored bytes over the wire. Compare is constant-time.
  // The factory tool uses this to confirm a re-keyed device actually
  // received the production keys (the boolean from GetStatus only tells
  // you a device has *some* keys, not the right ones).
  rpc Verify(ProvisionRequest) returns (VerifyResponse);
}

message Empty {}

message ProvisionRequest {
  // Master secret for ASCON key derivation (gateway communication).
  bytes gateway_master_secret = 1;  // Must be exactly 16 bytes

  // NTAG 424 DNA terminal key (KEY_TERMINAL, NTAG slot 1).
  bytes ntag_terminal_key = 2;  // Must be exactly 16 bytes

  // If true, clear any existing secrets before provisioning. Used by the
  // factory tool to re-key a previously provisioned device. Ignored by
  // Verify().
  bool force = 3;
}

message ProvisionResponse {
  bool success = 1;
  string error = 2;
}

message StatusResponse {
  bool is_provisioned = 1;
}

message VerifyResponse {
  // False if the device has no secrets at all — the match fields are then
  // also false and meaningless.
  bool is_provisioned = 1;
  bool gateway_match = 2;
  bool ntag_match = 3;
}
