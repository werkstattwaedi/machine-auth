name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: "Run e2e with --update-snapshots and upload the regenerated PNGs. The suite is sharded, so each shard uploads its own artifact — download them all and unzip into the snapshot dirs to update baselines."
        type: boolean
        default: false

# `contents: read` is the minimum scope this workflow needs (checkout
# only; no pushes, no comments, no releases). Locking it down silences
# the CodeQL "Workflow does not contain permissions" warning and limits
# the blast radius if a dependency in this pipeline is ever compromised.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # The `checkout-kiosk` workspace pulls `nfc-pcsc` → `@pokusew/pcsclite`,
      # which compiles a native addon that `#include <winscard.h>`. On Linux
      # that header ships with `libpcsclite-dev`; without it `npm ci` aborts
      # during gyp build. Kiosk isn't exercised by `test:precommit`, but the
      # root install resolves every workspace and there's no per-workspace
      # opt-out for gyp scripts.
      - name: Install system dependencies (libpcsclite-dev for kiosk native module)
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install dependencies (root workspaces)
        run: npm ci

      # Freshness guard (issue #296): the committed `.env.test` fixtures
      # MUST match what `generate-env --emit-test-files` produces. If a
      # new param is added to the operations config without updating the
      # `TEST_FIXTURE_CONFIG` / `TEST_FIXTURE_OVERRIDES` maps in
      # `scripts/generate-env.ts`, this fails fast — the e2e job below
      # would otherwise hang on a missing env var. `git status` catches
      # both content drift and a missing checked-in file (untracked
      # output is also a freshness failure).
      - name: Verify .env.test fixtures are fresh
        run: |
          npx tsx scripts/generate-env.ts --emit-test-files
          changed=$(git status --porcelain -- \
              functions/.env.test \
              web/apps/checkout/.env.test \
              web/apps/admin/.env.test)
          if [ -n "$changed" ]; then
            echo "::error::.env.test fixtures are stale. Run 'npx tsx scripts/generate-env.ts --emit-test-files' and commit:" >&2
            echo "$changed" >&2
            git diff --no-color -- \
                functions/.env.test \
                web/apps/checkout/.env.test \
                web/apps/admin/.env.test >&2 || true
            exit 1
          fi

      - name: Build & test (web + functions + integration)
        run: npm run test:precommit

  # The e2e suite is the long pole (~18 min of Playwright, 88% of it the
  # checkout app running 194 tests at `workers: 1`). Two changes cut it to
  # ~5 min (issue #530):
  #
  #  1. No `needs: test` — it was incidental, not a deliberate fail-fast
  #     gate, and it serialized 5 min of unit tests in front of every e2e
  #     run. The repo is public, so Actions minutes are free; the only cost
  #     of running concurrently is that a PR with a broken build also burns
  #     e2e runners.
  #  2. Fan out across runners. Sharding is safe because each job is a fresh
  #     runner with its own emulator and its own `globalSetup`, which
  #     clears-then-seeds idempotently — there is no cross-shard state.
  #
  # Admin gets its own leg rather than sharing checkout's emulator: both
  # apps hardcode PROJECT_ID "oww-maco" and admin's setup clears Firestore
  # *and* Auth, so they can't safely interleave. A separate runner is free.
  e2e-shard:
    name: e2e (${{ matrix.app }} ${{ matrix.shard }})
    runs-on: ubuntu-latest

    strategy:
      # Surface every shard's failures in one run. Cancelling siblings on the
      # first red would turn "which tests broke?" into a bisect across
      # re-runs, and the saved minutes are worth nothing on a public repo.
      fail-fast: false
      matrix:
        include:
          - { app: checkout, shard: 1/4 }
          - { app: checkout, shard: 2/4 }
          - { app: checkout, shard: 3/4 }
          - { app: checkout, shard: 4/4 }
          # Admin is 26 tests / ~2 min — one shard is plenty for now. When it
          # grows, add legs here; the config already reads PLAYWRIGHT_SHARD.
          - { app: admin, shard: 1/1 }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # Kiosk native dep — see comment in the `test` job above.
      - name: Install system dependencies (libpcsclite-dev for kiosk native module)
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install dependencies (root workspaces)
        run: npm ci

      # Functions are compiled TypeScript — the Firebase Functions emulator
      # loads `functions/lib/src/index.js`, which only exists after `tsc`
      # runs. The `test` job builds it implicitly as part of `npm run
      # test:precommit`, but this is a separate runner so we have to do
      # it again. Without this step the emulator silently runs without
      # Functions and every e2e that touches `requestLoginCode` /
      # checkout APIs fails on `getByTestId('login-code-stage')` timeouts.
      - name: Build functions
        run: cd functions && npm run build

      - name: Install Playwright browsers
        # `--with-deps` pulls the runtime system libraries chromium needs
        # (ffmpeg, fonts, NSS). Chromium only — Firefox/WebKit aren't part
        # of the e2e matrix.
        run: cd web/apps/${{ matrix.app }} && npx playwright install --with-deps chromium

      - name: Show Playwright version
        # Surfacing the pinned version makes screenshot drift across
        # bundle bumps debuggable from the CI log alone.
        run: cd web/apps/${{ matrix.app }} && npx playwright --version

      - name: Run e2e tests
        # `npm run test:web:e2e:<app>` wraps itself in the port-block broker,
        # which falls back to the committed `.env.test` fixtures when the
        # operations repo isn't present (i.e. on CI). See docs/port-blocks.md.
        #
        # Both knobs travel as env vars rather than CLI flags: npm doesn't
        # forward `--` args through the nested `npm run` → `emulators:exec` →
        # `playwright test` chain, so the configs read them directly.
        # PLAYWRIGHT_UPDATE_SNAPSHOTS is empty on non-dispatch events, which
        # the configs treat as "don't update".
        env:
          PLAYWRIGHT_SHARD: ${{ matrix.shard }}
          PLAYWRIGHT_UPDATE_SNAPSHOTS: ${{ inputs.update_snapshots }}
        run: npm run test:web:e2e:${{ matrix.app }}

      # Regular CI failure artifact. Inside each failed-test directory
      # Playwright writes `*-actual.png` / `*-expected.png` / `*-diff.png`
      # alongside the trace.zip — drop the `*-actual.png` into the
      # corresponding `e2e/*.spec.ts-snapshots/` path to update a baseline.
      - name: Upload Playwright traces + screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          # Artifact names must be unique across matrix legs, and a shard
          # ("1/4") can't appear in one — slashes are illegal.
          name: playwright-artifacts-${{ matrix.app }}-${{ strategy.job-index }}
          path: web/apps/${{ matrix.app }}/test-results/
          if-no-files-found: ignore
          retention-days: 7

      # On `workflow_dispatch` with `update_snapshots: true`, ship the
      # regenerated baselines as a flat artifact. Each shard only regenerates
      # the baselines for the tests it ran, so download every
      # `updated-snapshots-*` artifact and unzip them all into the repo
      # (`unzip -o updated-snapshots-*.zip`), then commit and push.
      - name: Upload regenerated snapshot baselines
        if: always() && inputs.update_snapshots == true
        uses: actions/upload-artifact@v4
        with:
          name: updated-snapshots-${{ matrix.app }}-${{ strategy.job-index }}
          path: web/apps/${{ matrix.app }}/e2e/**/*-snapshots/**
          if-no-files-found: warn
          retention-days: 7

  # Aggregate gate. The matrix legs' check names embed the shard
  # ("e2e (checkout 1/4)"), so they'd churn on every re-shard and can't be
  # pinned in branch protection. This job keeps one stable `e2e` check that
  # is green only when every leg is.
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    needs: e2e-shard
    # `always()` so a failed shard produces a *failed* gate rather than a
    # skipped one — a skipped required check blocks a PR forever.
    if: always()

    steps:
      - name: Verify every e2e shard passed
        # `needs.e2e-shard.result` collapses the whole matrix: it is
        # "success" only if every leg succeeded.
        run: |
          result="${{ needs.e2e-shard.result }}"
          if [ "$result" != "success" ]; then
            echo "::error::e2e shards did not all pass (result: $result)"
            exit 1
          fi
          echo "All e2e shards passed."
