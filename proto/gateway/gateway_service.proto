syntax = "proto3";

package maco.gateway;

// Gateway service for MACO device to MACO Gateway communication.
//
// The gateway acts as a proxy between MACO devices (P2) and Firebase Cloud
// Functions. Devices communicate with the gateway over TCP using pw_rpc with
// ASCON encryption. The gateway forwards requests to Firebase via HTTPS.
//
// This design allows:
// - Adding new Firebase endpoints without gateway changes
// - Central logging and monitoring on the gateway
// - Key management isolated to the gateway
service GatewayService {
  // Forward a request to Firebase Cloud Functions.
  //
  // The endpoint and payload are opaque to the gateway - it simply forwards
  // the request and returns the response. This allows adding new Firebase
  // endpoints without updating the gateway.
  //
  // Example endpoints:
  //   "/api/startSession" - Start a new session
  //   "/api/uploadUsage" - Upload usage data
  //   "/api/completeAuth" - Complete authentication
  rpc Forward(ForwardRequest) returns (ForwardResponse);

  // Persist a log entry on the gateway.
  //
  // Used for offline logging when Firebase is unreachable. Logs are stored
  // locally and can be synced later.
  rpc PersistLog(LogEntry) returns (LogResponse);

  // Ping the gateway to check connectivity.
  //
  // Returns the gateway's current timestamp. Can be used for connection
  // health checks and clock synchronization.
  rpc Ping(PingRequest) returns (PingResponse);

  // Acquire a machine-activity sensing lease (see ADR-0035).
  //
  // The gateway lazily starts a background prober for the machine described by
  // `spec` and returns a lease id plus the current state. The terminal renews
  // the lease on each poll to keep the prober alive; when the lease lapses the
  // gateway drops the device connection. This keeps the device-specific
  // (e.g. xTool WebSocket) protocol entirely in the gateway.
  rpc AcquireSensingLease(AcquireSensingLeaseRequest) returns (SensingLeaseResponse);

  // Renew a sensing lease and read the machine's current state. This is the
  // poll: it both extends the lease TTL and returns the latest state.
  rpc RenewSensingLease(RenewSensingLeaseRequest) returns (SensingLeaseResponse);
}

// Request to forward to Firebase.
message ForwardRequest {
  // Firebase endpoint path (e.g., "/api/startSession")
  string endpoint = 1;

  // Request payload (serialized protobuf, opaque to gateway)
  bytes payload = 2;

  // Optional request ID for correlation
  uint32 request_id = 3;
}

// Response from Firebase forwarding.
message ForwardResponse {
  // True if Firebase returned a successful response
  bool success = 1;

  // Response payload (serialized protobuf, opaque to gateway)
  bytes payload = 2;

  // HTTP status code from Firebase (0 if not applicable)
  uint32 http_status = 3;

  // Error message if success is false
  string error = 4;

  // Request ID for correlation (echoed from request)
  uint32 request_id = 5;
}

// Log entry to persist on gateway.
message LogEntry {
  // Log level
  enum Level {
    LEVEL_UNSPECIFIED = 0;
    DEBUG = 1;
    INFO = 2;
    WARN = 3;
    ERROR = 4;
  }

  // Timestamp (milliseconds since epoch)
  uint64 timestamp_ms = 1;

  // Log level
  Level level = 2;

  // Log module/component name
  string module = 3;

  // Log message
  string message = 4;

  // Optional structured data (JSON)
  string data = 5;
}

// Response to log persistence.
message LogResponse {
  // True if log was persisted successfully
  bool success = 1;

  // Number of pending logs on gateway
  uint32 pending_count = 2;
}

// Ping request.
message PingRequest {
  // Client timestamp (milliseconds since epoch)
  uint64 client_timestamp_ms = 1;
}

// Ping response.
message PingResponse {
  // Gateway timestamp (milliseconds since epoch)
  uint64 gateway_timestamp_ms = 1;

  // Echo of client timestamp
  uint64 client_timestamp_ms = 2;
}

// Describes what the gateway should sense. Mirrors the device_config
// SensingSpec; the backend is selected by which oneof arm is set.
message SensingSpec {
  oneof backend {
    XToolLaserControl xtool_laser = 1;
    MockSensingControl mock = 2;
  }
}

// xTool laser sensed over its LAN WebSocket protocol.
message XToolLaserControl {
  // Laser hostname or IP on the LAN
  string host = 1;
  // Laser API port (0 => default 28900)
  uint32 port = 2;
  // Interval between laser state polls, in seconds (0 => default 3)
  uint32 poll_interval_sec = 3;
}

// Scriptable sensing backend for the host simulator and tests.
message MockSensingControl {}

// Machine activity state as observed by the gateway's prober.
enum SensingState {
  SENSING_STATE_UNSPECIFIED = 0;
  // Gateway can't reach the device — the terminal treats this as idle.
  SENSING_STATE_UNREACHABLE = 1;
  // Reachable, not actively working.
  SENSING_STATE_IDLE = 2;
  // Reachable and actively working (e.g. laser cutting).
  SENSING_STATE_RUNNING = 3;
}

// Acquire a sensing lease for a machine.
message AcquireSensingLeaseRequest {
  // What to sense.
  SensingSpec spec = 1;
  // How long the lease survives without renewal, in seconds (0 => default 60).
  uint32 lease_ttl_sec = 2;
}

// Renew (poll) an existing sensing lease.
message RenewSensingLeaseRequest {
  // Lease id returned by AcquireSensingLease.
  string lease_id = 1;
}

// Response to acquire/renew: the lease handle and current state.
message SensingLeaseResponse {
  // Lease id to renew with; empty when valid is false.
  string lease_id = 1;
  // False if the lease is unknown/expired — the caller must re-acquire.
  bool valid = 2;
  // Current machine activity state.
  SensingState state = 3;
}
